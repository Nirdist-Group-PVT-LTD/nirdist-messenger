services:
  - type: web
    name: nirdist-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: back-end
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: JDBC_DATABASE_URL
        value: ${NEON_CONNECTION_STRING}
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"