services:
  - type: web
    name: nirdist-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: back-end
    dockerfilePath: back-end/Dockerfile
    dockerContext: back-end
    healthCheckPath: /api/health
    envVars:
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: nirdist-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: nirdist-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: nirdist-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false

databases:
  - name: nirdist-db
    databaseName: nirdist
    user: nirdist_user
    postgresMajorVersion: "15"
    region: oregon