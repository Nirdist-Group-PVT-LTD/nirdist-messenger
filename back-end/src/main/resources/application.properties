spring.application.name=nirdist-backend
server.port=${PORT:8080}
server.address=0.0.0.0
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=lazy

spring.datasource.url=${JDBC_DATABASE_URL:${NEON_CONNECTION_STRING:${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:${PGHOST:localhost}}:${DB_PORT:${PGPORT:5432}}/${DB_NAME:${PGDATABASE:nirdist}}}}}
spring.datasource.username=${DB_USER:${PGUSER:nirdist}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:nirdist}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.data-source-properties.channelBinding=disable
spring.datasource.hikari.data-source-properties.sslmode=require

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=${JWT_SECRET:51llV0Q+aMC2Rike4xj4evPsOk9RoXd91V2dQq1W4Zr0Eu5IlFM4tXK1oAt9hJYL3t1DTIDiBam7io6Hwgrleg==}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}
app.firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
app.firebase.project-id=${FIREBASE_PROJECT_ID:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.root=INFO
logging.level.com.nirdist=INFO
logging.level.org.springframework.security=INFO

app.chat.cache.max-messages-per-room=100